<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Authorization — Callback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      margin: 0; display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb; color: #111827; transition: background 0.3s ease, color 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #030712; color: #f9fafb; }
      .card { background: #111827; border-color: #374151; }
      .spinner { border-color: #374151; border-top-color: #6366f1; }
      p { color: #9ca3af; }
    }
    .card {
      background: #ffffff; border: 1px solid #e5e7eb; border-radius: 16px;
      padding: 2.5rem; max-width: 360px; width: 90%; text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.04);
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e5e7eb;
      border-top-color: #6366f1; border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .card { animation: fadeIn 0.3s ease forwards; }
    p { font-size: 0.875rem; color: #6b7280; line-height: 1.5; }
    .logo-icon {
      width: 2.5rem; height: 2.5rem; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem; box-shadow: 0 4px 12px rgba(99,102,241,0.2);
    }
    .logo-icon svg { width: 1.25rem; height: 1.25rem; color: #fff; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-icon" aria-hidden="true">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2zM4 6a2 2 0 100-4 2 2 0 000 4z"/></svg>
    </div>
    <div class="spinner" role="status" aria-label="Loading"></div>
    <p>Completing LinkedIn authorization...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/linkedin-callback.js"></script>
</body>
</html>
